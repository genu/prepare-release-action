name: "Prepare Release"
description: "Creates a release-triggering PR summarizing dependency changes since the last tag. Designed for projects using release-please + Renovate."

inputs:
    commit-type:
        description: "Conventional commit type for the release trigger commit"
        required: false
        default: "fix"
    commit-scope:
        description: "Conventional commit scope for the release trigger commit"
        required: false
        default: "deps"
    commit-message:
        description: "Conventional commit message (without type/scope prefix)"
        required: false
        default: "update dependencies"
    auto-merge:
        description: "Enable auto-merge on the created PR"
        required: false
        default: "true"
    pr-labels:
        description: "Comma-separated labels to apply to the PR"
        required: false
        default: ""

outputs:
    committed:
        description: "Whether a release PR was created"
        value: ${{ steps.pr.outputs.committed }}
    pr-url:
        description: "URL of the created pull request"
        value: ${{ steps.pr.outputs.pr-url }}
    pr-number:
        description: "Number of the created pull request"
        value: ${{ steps.pr.outputs.pr-number }}

runs:
    using: "composite"
    steps:
        - name: Prepare release PR
          id: pr
          shell: bash
          env:
              TYPE: ${{ inputs.commit-type }}
              SCOPE: ${{ inputs.commit-scope }}
              MESSAGE: ${{ inputs.commit-message }}
              AUTO_MERGE: ${{ inputs.auto-merge }}
              PR_LABELS: ${{ inputs.pr-labels }}
              GH_TOKEN: ${{ github.token }}
          run: |
              if ! command -v jq &>/dev/null; then
                  echo "::error::jq is required but not found"
                  exit 1
              fi

              if [ ! -f package.json ]; then
                  echo "::error::package.json not found in repository root"
                  exit 1
              fi

              LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

              if [ -n "$LAST_TAG" ]; then
                  COMMIT_COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
                  if [ "$COMMIT_COUNT" -eq 0 ]; then
                      echo "No commits since last release ($LAST_TAG). Nothing to release."
                      echo "committed=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi
              fi

              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

              if [ -z "$LAST_TAG" ]; then
                  BODY="Initial release"
              elif ! git show "${LAST_TAG}:package.json" &>/dev/null; then
                  BODY="Initial dependency tracking"
              else
                  OLD_DEPS=$(git show "${LAST_TAG}:package.json" | jq '[(.dependencies // {}), (.devDependencies // {})] | add')
                  NEW_DEPS=$(jq '[(.dependencies // {}), (.devDependencies // {})] | add' package.json)

                  CHANGES=$(jq -nr \
                      --argjson old "$OLD_DEPS" \
                      --argjson new "$NEW_DEPS" \
                      '
                      [
                          ($new | to_entries[] | select($old[.key] != null and $old[.key] != .value) | "updated \(.key) \($old[.key]) → \(.value)"),
                          ($new | to_entries[] | select($old[.key] == null) | "added \(.key) \(.value)"),
                          ($old | to_entries[] | select($new[.key] == null) | "removed \(.key)")
                      ] | join(", ")
                      '
                  )

                  if [ -n "$CHANGES" ]; then
                      BODY="$CHANGES"
                  else
                      BODY="routine maintenance"
                  fi
              fi

              if [ -n "$SCOPE" ]; then
                  HEADER="${TYPE}(${SCOPE}): ${MESSAGE}"
              else
                  HEADER="${TYPE}: ${MESSAGE}"
              fi

              # Clean up stale prepare-release branches from previous runs
              git fetch origin 'refs/heads/prepare-release/*:refs/remotes/origin/prepare-release/*' 2>/dev/null || true
              for ref in $(git for-each-ref --format='%(refname:short)' 'refs/remotes/origin/prepare-release/'); do
                  branch="${ref#origin/}"
                  echo "Deleting stale branch: $branch"
                  git push origin --delete "$branch" 2>/dev/null || true
              done

              BRANCH="prepare-release/$(date -u +%Y%m%d-%H%M%S)"
              git checkout -b "$BRANCH"

              git commit --allow-empty -m "$HEADER" -m "$BODY"
              git push origin "$BRANCH"

              PR_ARGS=(--title "$HEADER" --body "$BODY")

              if [ -n "$PR_LABELS" ]; then
                  PR_ARGS+=(--label "$PR_LABELS")
              fi

              PR_URL=$(gh pr create "${PR_ARGS[@]}")
              PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq '.number')

              echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
              echo "pr-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "committed=true" >> "$GITHUB_OUTPUT"

              if [ "$AUTO_MERGE" = "true" ]; then
                  gh pr merge "$PR_URL" --auto --squash
              fi
